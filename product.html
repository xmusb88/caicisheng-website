<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品展示 - 厦门财生生科技有限公司</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
:root{--blue:#0066CC}
.container{width:90%;max-width:1200px;margin:0 auto}
.header{background:#fff;border-bottom:2px solid var(--blue)}
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 0}
.logo{font-size:22px;font-weight:bold;color:var(--blue)}
.logo img{height:40px;vertical-align:middle;margin-right:10px}
.nav-list{display:flex;gap:30px;list-style:none}
.nav-list a{color:#333;text-decoration:none}
.nav-list a.active{color:var(--blue);font-weight:bold}
.section{padding:60px 0;background:#f5f5f5}
.title{text-align:center;font-size:28px;color:var(--blue);margin-bottom:30px}
.products{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.product{background:#fff;border-radius:8px;overflow:hidden}
.product img{width:100%;height:180px;object-fit:cover}
.product .info{padding:20px}
.product h3{color:var(--blue);margin-bottom:10px}
.footer{background:var(--blue);color:#fff;text-align:center;padding:30px;margin-top:30px}
</style>
</head>
<body>

<div class="header">
<div class="container nav">
<div class="logo"><img src="https://picsum.photos/40/40?color=0066CC">厦门财生生科技有限公司</div>
<ul class="nav-list">
<li><a href="index.html">首页</a></li>
<li><a href="about.html">关于我们</a></li>
<li><a href="product.html" class="active">产品展示</a></li>
<li><a href="contact.html">联系我们</a></li>
</ul>
</div>
</div>

<div class="section">
<div class="container">
<h2 class="title">产品展示</h2>
<div class="products" id="productList"></div>
</div>
</div>

<div class="footer">
<p>厦门财生生科技有限公司 © 2025 版权所有</p>
</div>

<script>
window.onload = function(){
let products = JSON.parse(localStorage.getItem("products")||"[]");
let html = "";
products.forEach(p=>{
html+=`
<div class="product">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<p>${p.desc}</p>
</div>
</div>`;
});
document.getElementById("productList").innerHTML = html;
}
</script>
</body>
</html>
