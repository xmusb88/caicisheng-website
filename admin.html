<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
:root{--blue:#0066CC}
body{background:#f5f5f5}
.login{height:100vh;display:flex;align-items:center;justify-content:center}
.login .box{background:#fff;padding:40px;width:400px;border-radius:8px}
.login h2{text-align:center;color:var(--blue);margin-bottom:20px}
.login input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:4px}
.login button{background:var(--blue);color:#fff;border:none;padding:12px;width:100%;border-radius:4px}
.admin{display:none}
.header{background:var(--blue);color:#fff;display:flex;justify-content:space-between;align-items:center;padding:15px 30px}
.header button{background:#fff;color:var(--blue);border:none;padding:8px 15px;border-radius:4px}
.main{width:90%;max-width:1200px;margin:30px auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.card{background:#fff;padding:20px;border-radius:8px;margin-bottom:20px}
.card h3{color:var(--blue);margin-bottom:15px}
input,textarea{width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:4px}
button{background:var(--blue);color:#fff;border:none;padding:8px 12px;border-radius:4px;margin-right:5px}
.product-item{padding:10px;background:#f5f5f5;margin-bottom:8px;border-radius:4px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div class="login">
<div class="box">
<h2>管理员登录</h2>
<input id="user" placeholder="账号" value="admin">
<input id="pwd" placeholder="密码" value="123456">
<button onclick="login()">登录</button>
</div>
</div>

<div class="admin">
<div class="header">
<h2>厦门财生生科技 - 管理后台</h2>
<button onclick="logout()">退出</button>
</div>

<div class="main">
<div class="card">
<h3>首页轮播大图</h3>
<input id="bannerImg" placeholder="图片网址">
<button onclick="saveBanner()">保存大图</button>
</div>

<div class="card">
<h3>公司简介</h3>
<textarea id="intro" rows="8"></textarea>
<button onclick="saveIntro()">保存</button>
</div>

<div class="card">
<h3>关于我们</h3>
<textarea id="about" rows="8"></textarea>
<button onclick="saveAbout()">保存</button>
</div>

<div class="card">
<h3>联系方式</h3>
<input id="phone" placeholder="电话">
<input id="qq" placeholder="QQ">
<input id="email" placeholder="邮箱">
<button onclick="saveContact()">保存</button>
</div>

<div class="card">
<h3>添加/编辑产品</h3>
<input id="pname" placeholder="产品名称">
<textarea id="pdesc" placeholder="产品介绍" rows="3"></textarea>
<input id="pimg" placeholder="产品图片网址">
<button onclick="saveProduct()">保存产品</button>
</div>

<div class="card">
<h3>产品列表</h3>
<div id="plist"></div>
</div>
</div>
</div>

<script>
let editIndex=-1;
const defaultIntro = `厦门财生生科技公司拥有一支业务精湛、经验丰富的专业取样检测团队，中高级职称人员比例达80%以上，均是船舶行业、检测行业的资深人员，熟悉国际海事公约和各港口国地方法规，能够熟练使用ISO、EPA、GB等多种方法进行检测，同时熟悉相关船用设备的功能、要求，能够有针对性的制定检测方案并且给出有效的问题解决方案。

公司经营范围：检验检测服务；船舶修理；船舶检验服务技术服务、技术开发、技术咨询、技术交流、技术转让环境监测专用仪器仪表销售；实验分析仪器销售；生态环境监测及检测仪器仪表销售；生态环境材料销售；建筑材料销售；机械设备销售；普通机械设备安装服务；劳务服务（不含劳务派遣）。工业自动化系统、仪器仪表、机电成套设备（不含汽车）的检测、安装、维护、维修、技术服务；检测技术推广、咨询；工业产品检测；批发：仪器设备、农业机械产品、机械包装设备、机电产品（不含九座及九座以下乘用车）、化工试剂（不含危险品）、装饰材料、计算机及配件、家具、办公用品及耗材、服装、教学仪器设备；计算机软硬件的技术研究与销售，计算机软件开发；室内外装饰装潢工程设计与施工。（依法须经批准的项目，经相关部门批准后方可开展经营活动）。`;

const defaultAbout = `<h3 style="color: #0066CC; margin-bottom: 15px;">资深专业的人员</h3>
<p>公司拥有一支业务精湛、经验丰富的专业取样检测团队，中高级职称人员比例达80%以上，均是船舶行业、检测行业的资深人员，熟悉国际海事公约和各港口国地方法规，能够熟练使用ISO、EPA、GB等多种方法进行检测，同时熟悉相关船用设备的功能、要求，能够有针对性的制定检测方案并且给出有效的问题解决方案。</p>

<h3 style="color: #0066CC; margin-bottom: 15px;">标准化实验室</h3>
<p>为满足船舶有害物质（IHM）的分析以及压载水D-2标准的详细分析，经过专业设计，我们有标准化的检测实验室，配备二级生物安全实验室（BSL-2）等，整体配套齐全，具备前沿的硬件设施和标准的检测环境。实验室配备荧光显微镜、体视显微镜、生物显微镜、超低温冰箱、医用冷藏箱、生化培养箱、高温灭菌器、生物安全柜、洁净工作台、纯水仪等30余种精密仪器设备。</p>

<h3 style="color: #0066CC; margin-bottom: 15px;">强大的技术支持</h3>
<p>公司聘请中国海洋大学教授和集美大学教授为技术总监，能够为我们提供全面的技术指导与支持。核心团队主要从事污染控制微生物分子生态学、废水生物处理技术、海洋微生物学等研究，2004年IMO《国际船舶压载水及沉积物管理与控制公约》生效后，深度参与船舶压载水处理科研工作，在压载水D-2标准检测验证中完成大量实船检测、路基检测工作，积累了丰富的实战经验和第一手资料。</p>

<h3 style="color: #0066CC; margin-bottom: 15px;">强强联合</h3>
<p>厦门财生生科技与厦门海关技术中心、中检集团、海检集团合作，在水质检测、船舶有害物质（IHM）、油品化验、气体分析等领域进行全方位合作，我们不仅能够满足客户的检测需求，还可以根据检测结果进行跟踪比对、分析整合，帮助客户评价机械设备的技术状态，并提出相应的处理建议，为客户提供深层次的服务。</p>`;

const defaultProducts = [
    {name:"船舶有害物质（IHM）检测",desc:"专业开展船舶有害物质取样与分析，符合国际海事公约标准，提供全面的检测报告与解决方案。",img:"https://picsum.photos/300/180?topic=shipdetect"},
    {name:"压载水D-2标准检测",desc:"依据IMO公约要求，完成压载水实船/路基检测，精准验证是否满足D-2排放标准。",img:"https://picsum.photos/300/180?topic=waterdetect"},
    {name:"船舶水质检测",desc:"涵盖船舶生活污水、工业废水等多类水质检测，采用ISO/EPA/GB标准，数据精准可靠。",img:"https://picsum.photos/300/180?topic=waterquality"},
    {name:"船舶油品化验",desc:"专业开展船舶燃油、润滑油等油品成分分析、质量检测，为船舶设备运行提供保障。",img:"https://picsum.photos/300/180?topic=oiltest"},
    {name:"船舶气体分析",desc:"针对船舶舱室气体、尾气等进行成分分析与浓度检测，排查安全隐患，符合港口国法规。",img:"https://picsum.photos/300/180?topic=gasdetect"},
    {name:"船舶修理与检验服务",desc:"提供船舶设备检测、维修、安装服务，结合检测数据评价设备状态，给出专业维修建议。",img:"https://picsum.photos/300/180?topic=shiprepair"}
];

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pwd").value;
if(u=="admin"&&p=="123456"){
document.querySelector(".login").style.display="none";
document.querySelector(".admin").style.display="block";
// 如果没有数据，自动填充默认值
if(!localStorage.getItem("intro")) localStorage.setItem("intro", defaultIntro);
if(!localStorage.getItem("about")) localStorage.setItem("about", defaultAbout);
if(!localStorage.getItem("products")) localStorage.setItem("products", JSON.stringify(defaultProducts));
loadData();
}else{alert("账号密码错误")}
}
function logout(){
document.querySelector(".login").style.display="flex";
document.querySelector(".admin").style.display="none";
editIndex=-1;
}

function loadData(){
let b=JSON.parse(localStorage.getItem("banner")||'{"img":"https://picsum.photos/1920/380?ship"}');
document.getElementById("bannerImg").value=b.img;
document.getElementById("intro").value=localStorage.getItem("intro")||defaultIntro;
document.getElementById("about").value=localStorage.getItem("about")||defaultAbout;
let c=JSON.parse(localStorage.getItem("contact")||'{"phone":"13860191918","qq":"515115543@qq.com","email":"ess88@qq.com"}');
document.getElementById("phone").value=c.phone;
document.getElementById("qq").value=c.qq;
document.getElementById("email").value=c.email;
refreshProductList();
}

function saveBanner(){
let img=document.getElementById("bannerImg").value;
localStorage.setItem("banner",JSON.stringify({img}));
alert("首页大图保存成功！前台刷新生效");
}
function saveIntro(){
localStorage.setItem("intro",document.getElementById("intro").value);
alert("保存成功");
}
function saveAbout(){
localStorage.setItem("about",document.getElementById("about").value);
alert("保存成功");
}
function saveContact(){
let c={
phone:document.getElementById("phone").value,
qq:document.getElementById("qq").value,
email:document.getElementById("email").value
};
localStorage.setItem("contact",JSON.stringify(c));
alert("保存成功");
}

function saveProduct(){
let name=document.getElementById("pname").value;
let desc=document.getElementById("pdesc").value;
let img=document.getElementById("pimg").value;
if(!name||!desc||!img){alert("请填写完整");return}
let list=JSON.parse(localStorage.getItem("products")||"[]");
let item={name,desc,img};
if(editIndex===-1){list.push(item)}else{list[editIndex]=item;editIndex=-1}
localStorage.setItem("products",JSON.stringify(list));
alert("产品保存成功");
document.getElementById("pname").value="";
document.getElementById("pdesc").value="";
document.getElementById("pimg").value="";
refreshProductList();
}

function refreshProductList(){
let list=JSON.parse(localStorage.getItem("products")||"[]");
let html="";
list.forEach((item,index)=>{
html+=`
<div class="product-item">
<span>${item.name}</span>
<div>
<button onclick="editProduct(${index})">编辑</button>
<button onclick="delProduct(${index})">删除</button>
</div>
</div>`;
});
document.getElementById("plist").innerHTML=html;
}

function editProduct(index){
let list=JSON.parse(localStorage.getItem("products")||"[]");
let p=list[index];
document.getElementById("pname").value=p.name;
document.getElementById("pdesc").value=p.desc;
document.getElementById("pimg").value=p.img;
editIndex=index;
}

function delProduct(index){
if(!confirm("确定删除？"))return;
let list=JSON.parse(localStorage.getItem("products")||"[]");
list.splice(index,1);
localStorage.setItem("products",JSON.stringify(list));
refreshProductList();
}
</script>
</body>
</html>
